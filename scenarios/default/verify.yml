---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify service ports
      ansible.builtin.import_role:
        name: tests/diffusion_tests
      vars:
        verify_ports:
          - port: 8443
            description: "HTTPS port"
          - port: 8080
            description: "HTTP port"
          - port: 8117
            description: "Checkpoint nano agent health port."
    - name: Test Docker containers
      ansible.builtin.import_role:
        name: tests/diffusion_tests
      vars:
        docker_user: "docker-adm"
        verify_docker_containers:
          - name: "cp_waf_agent"
            state: "running"
            image: "docker.io/checkpoint/cloudguard-appsec-standalone:1185074"
