---
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          ARCHIVE="polar-checkpoint_waf_agent-${{ steps.version.outputs.version }}.tar.gz"
          tar -czf "/tmp/$ARCHIVE" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='molecule' \
            .
          mv "/tmp/$ARCHIVE" .

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: polar-checkpoint_waf_agent-${{ steps.version.outputs.version }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: polar-checkpoint_waf_agent-${{ steps.version.outputs.version }}.tar.gz

      - name: Strip namespace from meta for Galaxy import
        run: sed -i '/^\s*namespace:/d' meta/main.yml

      - name: Publish to Ansible Galaxy
        uses: ansible-actions/ansible-galaxy-action@v1.2.0
        with:
          galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
          galaxy_version: ${{ github.ref_name }}
