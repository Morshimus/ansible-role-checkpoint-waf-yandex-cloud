---
name: Scheduled Update

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Diffusion Update
        uses: Polar-Team/diffusion/diffusion-update@main
        with:
          target-branch: 'main'
          diffusion-version: 'latest'
          run-lint: 'true'
          run-verify: 'true'
          run-idempotence: 'true'
          cache-enabled: 'true'
          cache-uv: 'true'
          cache-docker: 'true'
          pr-title: 'chore(deps): update diffusion dependencies'
          pr-labels: ''
