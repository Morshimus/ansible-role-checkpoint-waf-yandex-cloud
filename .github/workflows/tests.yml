---
name: Tests

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    name: Molecule Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix rootless Docker AppArmor permissions
        run: |
          cat <<'EOT' | sudo tee /etc/apparmor.d/home.runner.bin.rootlesskit
          abi <abi/4.0>,
          include <tunables/global>

          /home/runner/bin/rootlesskit flags=(unconfined) {
            userns,

            include if exists <local/home.runner.bin.rootlesskit>
          }
          EOT
          sudo systemctl restart apparmor.service

      - name: Run Diffusion Tests
        uses: Polar-Team/diffusion/diffusion-test@main
        with:
          diffusion-version: 'latest'
          run-lint: 'true'
          run-verify: 'true'
          run-idempotence: 'true'
          cache-enabled: 'true'
          cache-uv: 'true'
          cache-docker: 'true'
